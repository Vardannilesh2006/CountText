<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- Violet -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Blue -->
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" /> <!-- Emerald -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Bubble -->
  <rect x="25" y="25" width="150" height="150" rx="42" fill="url(#brand-grad)" filter="url(#shadow)" />
  
  <!-- Overlay Glassy Bubble -->
  <rect x="40" y="40" width="120" height="120" rx="32" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" />

  <!-- Inner C and T combination path -->
  <!-- Stylized C -->
  <path d="M 90 70 A 22 22 0 1 0 90 130" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
  
  <!-- Stylized T -->
  <path d="M 100 70 L 140 70 M 120 70 L 120 130" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" />

  <!-- A small dot indicating active typing / notification -->
  <circle cx="145" cy="55" r="12" fill="url(#accent-grad)" stroke="#ffffff" stroke-width="3" />
</svg>
